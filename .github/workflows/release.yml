# Release
# Cuts a release from main — manually triggered (workflow_dispatch).
# Inputs: release-type (patch/minor/major), prerelease channel (none/
# alpha/beta/rc), dry-run (bool). Runs preflight (yarn check), builds
# packages, bumps versions, commits and tags via release-it, and
# publishes to npm with the matching dist-tag. For stable releases
# (prerelease: none) it also updates CHANGELOG.md (consolidating commits
# from the previous stable tag) and creates a GitHub Release entry.
#
# See RELEASING.md for the full release flow and
# .github/workflows/README.md for the workflow overview.

name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type (patch/minor/major)"
        type: choice
        required: true
        options:
          - patch
          - minor
          - major
        default: patch
      prerelease:
        description: "Prerelease channel (or 'none' for stable)"
        type: choice
        required: true
        options:
          - none
          - alpha
          - beta
          - rc
        default: none
      dry-run:
        description: "Dry-run only (no commit / push / publish)"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      deployments: write
    environment:
      name: ${{ inputs.prerelease == 'none' && 'npm-latest' || format('npm-{0}', inputs.prerelease) }}
      url: https://www.npmjs.com/package/@vc-shell/framework
    env:
      PRERELEASE_CHANNEL: ${{ inputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: "yarn.lock"
          registry-url: "https://registry.npmjs.org"
          always-auth: true

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Preflight checks
        run: yarn check

      - name: Build
        run: yarn build

      - name: Configure git user
        run: |
          git config user.name "vc-ci"
          git config user.email "ci@virtocommerce.com"

      - name: Run release-it
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          ARGS="${{ inputs.release-type }} --ci"
          if [ "${{ inputs.prerelease }}" != "none" ]; then
            ARGS="$ARGS --preRelease=${{ inputs.prerelease }}"
          fi
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "release-it args: $ARGS"
          yarn exec release-it $ARGS

      - name: Determine npm tag
        if: inputs.dry-run == false
        id: npm-tag
        run: |
          VERSION=$(node -p "require('./framework/package.json').version")
          NPM_TAG=$(node -e "const m='$VERSION'.match(/-(alpha|beta|rc|next)/); console.log(m?m[1]:'latest')")
          echo "Version: $VERSION → npm tag: $NPM_TAG"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NPM_TAG" >> $GITHUB_OUTPUT

      - name: Configure npm auth
        if: inputs.dry-run == false
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish packages to npm
        if: inputs.dry-run == false
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: yarn publish:packages --tag "${{ steps.npm-tag.outputs.tag }}"

      - name: Verify npm dist tags
        if: inputs.dry-run == false
        run: |
          PACKAGES=(
            "@vc-shell/framework"
            "@vc-shell/ts-config"
            "@vc-shell/create-vc-app"
            "@vc-shell/config-generator"
            "@vc-shell/api-client-generator"
          )
          for PACKAGE in "${PACKAGES[@]}"; do
            echo "Tags for $PACKAGE:"
            npm dist-tag ls "$PACKAGE" 2>/dev/null || echo "Package not found in npm"
            echo "---"
          done
