name: Framework Checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "framework/**"
      - "cli/**"
      - "configs/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/framework-checks.yml"
  push:
    branches:
      - main
      - dev
      - "feat/**"
    paths:
      - "framework/**"
      - "cli/**"
      - "configs/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/framework-checks.yml"

concurrency:
  group: framework-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  framework-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: "yarn.lock"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lockfile drift hint
        if: failure()
        run: |
          echo "::error title=yarn.lock is out of sync with package manifests::The previous step failed with YN0028 because yarn.lock does not match the current workspace versions. Run 'yarn install' locally, commit the updated yarn.lock, and push. See docs/superpowers/specs/2026-04-20-fix-ci-lockfile-design.md for context."
          exit 1

      - name: Type check framework
        run: yarn workspace @vc-shell/framework run type-check

      - name: Run framework tests
        run: yarn workspace @vc-shell/framework run test
