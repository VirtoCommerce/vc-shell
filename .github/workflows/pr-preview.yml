# PR Preview
# On every PR push publishes a preview of all managed packages to npm
# with a pr-<N> dist-tag. Fork PRs get an explanatory comment instead.
# PR close triggers cleanup that removes the pr-<N> dist-tag.
#
# See .github/workflows/README.md for the full workflow overview.

name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: "yarn.lock"
          registry-url: "https://registry.npmjs.org"
          always-auth: true

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Compute preview version
        id: version
        run: |
          yarn tsx scripts/compute-preview-version.ts \
            "${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.head.sha }}"

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish preview packages
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: yarn publish:packages --tag "pr-${{ github.event.pull_request.number }}"

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const version = `${{ steps.version.outputs.version }}`;
            const shortSha = "${{ github.event.pull_request.head.sha }}".slice(0, 7);
            const marker = "<!-- pr-preview-bot -->";

            const body = `${marker}
            📦 **Preview published** for commit \`${shortSha}\`

            Install the preview with dist-tag:
            \`\`\`bash
            npm install @vc-shell/framework@pr-${prNumber}
            \`\`\`

            Or pin to the exact commit:
            \`\`\`bash
            npm install @vc-shell/framework@${version}
            \`\`\`

            Published packages (dist-tag \`pr-${prNumber}\`, version \`${version}\`):
            - @vc-shell/framework
            - @vc-shell/api-client-generator
            - @vc-shell/create-vc-app
            - @vc-shell/config-generator
            - @vc-shell/migrate
            - @vc-shell/ts-config
            - @vc-shell/mf-config
            - @vc-shell/mf-host
            - @vc-shell/mf-module
            - @vc-shell/vc-app-skill
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  notify-fork:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post fork-PR notice
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const marker = "<!-- pr-preview-fork-notice -->";

            const body = `${marker}
            ⚠️ **Preview not available for fork PRs**

            This PR was opened from a fork, so preview publishing is skipped (GitHub secrets are not available in fork workflows). Maintainers can cherry-pick these changes into a branch in this repository to get an automatic preview.
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) return;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          scope: "@vc-shell"
          always-auth: true

      - name: Remove pr dist-tags
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -u
          TAG="pr-${PR_NUMBER}"
          PACKAGES=(
            "@vc-shell/framework"
            "@vc-shell/api-client-generator"
            "@vc-shell/create-vc-app"
            "@vc-shell/config-generator"
            "@vc-shell/migrate"
            "@vc-shell/ts-config"
            "@vc-shell/mf-config"
            "@vc-shell/mf-host"
            "@vc-shell/mf-module"
            "@vc-shell/vc-app-skill"
          )
          FAILED=()
          for PACKAGE in "${PACKAGES[@]}"; do
            echo "::group::${PACKAGE} — checking dist-tag ${TAG}"
            if npm dist-tag ls "$PACKAGE" --registry=https://registry.npmjs.org/ | grep -q "^${TAG}:"; then
              echo "Removing ${TAG} from ${PACKAGE}..."
              if ! npm dist-tag rm "$PACKAGE" "$TAG" --registry=https://registry.npmjs.org/; then
                echo "::error::Failed to remove dist-tag ${TAG} from ${PACKAGE}"
                FAILED+=("$PACKAGE")
              fi
            else
              echo "Tag ${TAG} not present on ${PACKAGE} — nothing to do."
            fi
            echo "::endgroup::"
          done
          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "::error::Cleanup failed for: ${FAILED[*]}"
            exit 1
          fi
