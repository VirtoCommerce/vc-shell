name: Unpublish vc-app-skill versions

on:
  workflow_dispatch:

jobs:
  unpublish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - name: Unpublish alpha.17 through alpha.22
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for v in 17 18 19 20 21 22; do
            echo "Unpublishing @vc-shell/vc-app-skill@2.0.0-alpha.$v"
            npm unpublish "@vc-shell/vc-app-skill@2.0.0-alpha.$v" --force || true
          done
